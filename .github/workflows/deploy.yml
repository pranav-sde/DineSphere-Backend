name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build JAR
        run: mvn clean package -DskipTests

      # ✅ IMPORTANT: rename jar
      - name: Rename JAR
        run: mv target/*.jar target/app.jar

      # ✅ FIXED SCP
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/app.jar"
          target: "/home/ubuntu/"
          overwrite: true

      - name: Restart service with fallback
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Backing up current JAR..."
            cp /home/ubuntu/app.jar /home/ubuntu/app.jar.bak || true

            echo "Restarting service..."
            sudo systemctl restart dinesphere

            sleep 5

            echo "Checking if service is running..."
            if ! systemctl is-active --quiet dinesphere; then
              echo "Service failed! Rolling back..."

              cp /home/ubuntu/app.jar.bak /home/ubuntu/app.jar
              sudo systemctl restart dinesphere

              echo "Rollback done. Old version restored."
              exit 1
            fi

            echo "Service is running. Deployment successful."
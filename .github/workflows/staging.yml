name: Deploy Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Load SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STG_SSH_KEY }}

      - name: Add Host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.STG_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR
        run: |
          scp target/*.jar \
            ${{ vars.STG_USER }}@${{ vars.STG_HOST }}:/home/ubuntu/stg.jar

      - name: Restart Service
        run: |
          ssh ${{ vars.STG_USER }}@${{ vars.STG_HOST }} \
          "sudo systemctl restart dinesphere-stg"

      - name: Verify Service
        run: |
          ssh ${{ vars.STG_USER }}@${{ vars.STG_HOST }} \
          "systemctl is-active dinesphere-stg"

      - name: Health Check
        run: |
          curl --fail https://stg-api.dinesphere.co/cart/health
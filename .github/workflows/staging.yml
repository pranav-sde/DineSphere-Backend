name: Deploy Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Load SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STG_SSH_KEY }}

      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.STG_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR
        run: |
          scp target/*.jar \
            ${{ vars.STG_USER }}@${{ vars.STG_HOST }}:/home/ubuntu/stg.jar

      - name: Restart Staging Service
        run: |
          ssh ${{ vars.STG_USER }}@${{ vars.STG_HOST }} \
          "sudo systemctl restart dinesphere-stg"

      - name: Verify Service
        run: |
          ssh ${{ vars.STG_USER }}@${{ vars.STG_HOST }} \
          "systemctl is-active dinesphere-stg"

      - name: Wait for Application
        run: |
          echo "Waiting for application to become healthy..."

          for i in {1..30}; do
            if curl -fs https://stg-api.dinesphere.co/cart/health; then
              echo "Application is healthy."
              exit 0
            fi

            echo "Attempt $i/30 - application not ready yet..."
            sleep 5
          done

          echo "Application failed health check."
          exit 1
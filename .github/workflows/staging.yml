name: Deploy Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Application
        run: mvn clean package -DskipTests

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.STG_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "${{ vars.STG_HOST }}" >> ~/.ssh/known_hosts

      - name: Validate SSH Key
        run: |
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Upload Jar
        run: |
          scp -i ~/.ssh/id_ed25519 \
          -o StrictHostKeyChecking=yes \
          target/*.jar \
          ${{ vars.STG_USER }}@${{ vars.STG_HOST }}:/home/ubuntu/stg.jar

      - name: Restart Staging Service
        run: |
          ssh -i ~/.ssh/id_ed25519 \
          -o StrictHostKeyChecking=yes \
          ${{ vars.STG_USER }}@${{ vars.STG_HOST }} \
          "sudo systemctl restart dinesphere-stg"

      - name: Wait
        run: sleep 20

      - name: Verify Service
        run: |
          ssh -i ~/.ssh/id_ed25519 \
          ${{ vars.STG_USER }}@${{ vars.STG_HOST }} \
          "systemctl is-active dinesphere-stg"

      - name: Health Check
        run: |
          curl --fail https://stg-api.dinesphere.co/cart/health
name: Deploy Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: mvn clean package -DskipTests

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STG_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ vars.STG_HOST }} >> ~/.ssh/known_hosts

      - name: Upload Jar
        run: |
          scp target/*.jar \
          ${{ vars.STG_USER }}@${{ vars.STG_HOST }}:/home/ubuntu/stg.jar

      - name: Restart Service
        run: |
          ssh ${{ vars.STG_USER }}@${{ vars.STG_HOST }} \
          "sudo systemctl restart dinesphere-stg"
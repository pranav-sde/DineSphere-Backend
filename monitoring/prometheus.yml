global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'spring-boot-actuator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      # host.docker.internal resolves to the host machine (macOS) where Spring Boot is running
      - targets: ['host.docker.internal:8083']
        labels:
          application: 'food-qr-monolith'
